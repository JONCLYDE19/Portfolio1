<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form Modern UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to right, #1e1e2f, #3b42e8);
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .nav {
      width: 100%;
      position: fixed;
      height:8vh;
      top: 0;
      left: 0;
      background: linear-gradient(to right, #5779E2,#105DB7);
      box-shadow: 0 5px 5px rgba(0, 0, 0, 0.2);
      z-index: 999;
    }

    .nav ul {
      list-style:none;
      display:flex;
      align-items:center;
      height:8vh;
      padding:0 20px;
      
    }
    .nav ul li:first-child{
      margin-left:3%;
      margin-right: 50vw;
      
    }

    .nav li {
      display:flex;
      align-items:center;
      padding:0 15px;
      transition:0.3s;
    }

    .nav li:hover {
      transform: scale(1.15);
    }

    .nav a {
      text-decoration:none;
      color:white;
      display:flex;
      text-align: center;
      align-items:center;
      font-size: 18px;
      
    }

    .nav img {
      height:50px;
      width:50px;
      border-radius:50%;
      border:2px solid black;
    }

    /* GLASS CARD */
    .glass-card {
      width: 95%;
      max-width: 1000px;
      margin-top: 100px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      color: #fff;
    }

    .left {
      background: rgba(0,0,0,0.2);
      padding: 40px;
      text-align: center;
    }

    .left img {
      width: 80px;
      border: 3px solid black;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    .right {
      padding: 40px;
      background: rgba(255,255,255,0.05);
    }

    .form-control {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      border-radius: 10px;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .form-control:focus {
      border-color: #00ffcc;
      box-shadow: none;
      background: transparent;
      color: #fff;
    }

    .btn-custom {
      background: #00ffcc;
      border: none;
      color: #000;
      padding: 10px 25px;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn-custom:hover {
      background: #00ddb3;
    }

    .info i {
      font-size: 18px;
      margin-right: 8px;
      color: #00ffcc;
    }

    /* RESPONSIVE */
    @media(max-width: 768px) {
      .left, .right {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="nav">
  <ul>
    <li><a href="#">MY PORTFOLIO</a></li>
    <li><a href="#"><img src="JC2.jpeg"></a></li>
    <li><a href="indexL1.html">HOME</a></li>
    <li><a href="aboutme.html">ABOUT</a></li>
    <li><a href="Contact.html">CONTACT</a></li>
    <li><a href="Profile.html">PROFILE</a></li>
  </ul>
</header>

<!-- CONTACT CARD -->
<div class="glass-card">
  <div class="row g-0">

    <!-- LEFT SIDE -->
    <div class="col-md-4 left">
      <img src="JC2.jpg" alt="">
      <h2>Get in Touch</h2>
      <p>Feel free to contact us anytime.</p>

      <div class="mt-4 info">
        <p><i class="bi bi-geo-alt-fill"></i> Lappa, Luna, Apayao</p>
        <p><i class="bi bi-telephone-fill"></i> +63 900 000 0000</p>
        <p><i class="bi bi-envelope-fill"></i> support@email.com</p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-md-8 right">
      <h3 class="mb-4">Send Message</h3>

      <form class="row g-3">

        <div class="col-md-6">
          <input type="text" class="form-control" placeholder="First Name" required>
        </div>

        <div class="col-md-6">
          <input type="text" class="form-control" placeholder="Last Name" required>
        </div>

        <div class="col-12">
          <input type="email" class="form-control" placeholder="Email Address" required>
        </div>

        <div class="col-12">
          <input type="text" class="form-control" placeholder="Subject" required>
        </div>

        <div class="col-md-6">
          <input type="text" class="form-control" placeholder="City">
        </div>

        <div class="col-md-6">
          <input type="tel" class="form-control" placeholder="Contact Number" required>
        </div>

        <div class="col-12">
          <textarea class="form-control" rows="4" placeholder="Your Message..." required></textarea>
        </div>

        <div class="col-12">
          <button type="submit" class="btn btn-custom">
            Send Message
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

</body>
</html>
